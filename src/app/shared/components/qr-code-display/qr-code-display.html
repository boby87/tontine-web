<div class="overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-lg">
  <!-- Contenu principal -->
  <div class="flex flex-col items-center px-6 pb-5 pt-6">

    <!-- ── État : Chargement ───────────────── -->
    @if (isLoading()) {
      <div class="flex h-52 w-52 items-center justify-center rounded-xl bg-gray-50">
        <svg class="h-10 w-10 animate-spin text-indigo-500" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
      </div>
      <p class="mt-3 text-sm text-gray-400">Génération du QR Code…</p>
    }

    <!-- ── État : Erreur ───────────────────── -->
    @if (hasError() && !isLoading()) {
      <div class="flex h-52 w-52 flex-col items-center justify-center rounded-xl bg-red-50">
        <svg class="h-10 w-10 text-red-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
        <p class="mt-2 text-sm font-medium text-red-600">Impossible de charger le QR Code</p>
      </div>
      <button
        type="button"
        (click)="retry()"
        class="mt-3 inline-flex items-center gap-1.5 text-sm font-medium text-indigo-600 transition-colors hover:text-indigo-800"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" />
        </svg>
        Réessayer
      </button>
    }

    <!-- ── État : QR prêt ──────────────────── -->
    @if (isReady()) {
      <!-- Image QR Code -->
      <div class="rounded-xl border border-gray-100 bg-white p-3">
        <img
          [src]="qrImageUrl()"
          [alt]="'QR Code pour rejoindre ' + tontineNom()"
          class="h-52 w-52 object-contain"
        />
      </div>

      <!-- Texte sous le QR -->
      <p class="mt-4 text-center text-sm text-gray-500">
        Scannez pour rejoindre la tontine
        <span class="font-semibold text-gray-900">{{ tontineNom() }}</span>
      </p>

      <!-- Bouton Télécharger -->
      <button
        type="button"
        (click)="download()"
        class="mt-4 inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        <!-- Download icon -->
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Télécharger le QR Code
      </button>
    }
  </div>
</div>
