<header class="flex h-16 shrink-0 items-center justify-between border-b border-gray-200 bg-white px-4 shadow-sm lg:px-6">
  <!-- Left: hamburger (mobile) + collapse (desktop) -->
  <div class="flex items-center gap-2">
    <!-- Hamburger button — mobile only -->
    <button
      type="button"
      class="rounded-md p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700 lg:hidden"
      (click)="menuToggled.emit()"
      aria-label="Ouvrir le menu de navigation"
    >
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>

    <!-- Collapse button — desktop only -->
    <button
      type="button"
      class="hidden rounded-md p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700 lg:block"
      (click)="collapseToggled.emit()"
      aria-label="Réduire la barre latérale"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
      </svg>
    </button>

    <h1 class="hidden text-lg font-semibold text-gray-900 lg:block">TontineConnect</h1>
  </div>

  <!-- Right: notifications + profile -->
  <div class="flex items-center gap-3">
    <!-- Notification bell -->
    <button
      type="button"
      class="relative rounded-full p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700"
      aria-label="Voir les notifications"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
      <!-- Notification dot -->
      <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500" aria-hidden="true"></span>
    </button>

    <!-- User profile + logout -->
    <div class="flex items-center gap-3">
      <span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-600 text-xs font-semibold text-white">
        {{ authService.initials() }}
      </span>
      <div class="hidden md:block">
        <p class="text-sm font-medium text-gray-900">{{ authService.fullName() }}</p>
        <p class="text-xs text-gray-500">{{ authService.userRole() }}</p>
      </div>
      <button
        type="button"
        class="rounded-md p-2 text-gray-500 hover:bg-red-50 hover:text-red-600 transition-colors"
        (click)="logout()"
        aria-label="Se déconnecter"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
        </svg>
      </button>
    </div>
  </div>
</header>
