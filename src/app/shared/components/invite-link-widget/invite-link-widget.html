<div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
  <!-- En-tête -->
  <div class="flex items-center gap-2">
    <svg class="h-5 w-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101" />
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M10.172 13.828a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.102 1.101" />
    </svg>
    <h2 class="text-lg font-semibold text-gray-900">Lien d'invitation</h2>
  </div>
  <p class="mt-1 text-sm text-gray-500">
    Partagez ce lien pour inviter des membres à rejoindre votre tontine.
  </p>

  <!-- Bouton Générer (visible quand aucun lien) -->
  @if (!hasLink()) {
    <button
      type="button"
      (click)="generate()"
      class="mt-4 inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      [disabled]="isGenerating()"
      [class.opacity-75]="isGenerating()"
      [class.cursor-not-allowed]="isGenerating()"
    >
      @if (isGenerating()) {
        <!-- Spinner -->
        <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
        Génération…
      } @else {
        <!-- Link icon -->
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101" />
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.172 13.828a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.102 1.101" />
        </svg>
        Générer un nouveau lien
      }
    </button>
  }

  <!-- Input Group : lien + bouton copier -->
  @if (hasLink()) {
    <div class="mt-4 flex items-stretch rounded-lg border border-gray-300 bg-gray-50 shadow-sm transition-all focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-500/20">
      <!-- Icône globe -->
      <div class="flex shrink-0 items-center pl-3 pr-2 text-gray-400">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
        </svg>
      </div>

      <!-- Lien en lecture seule -->
      <input
        type="text"
        readonly
        [value]="invitationLink()"
        class="min-w-0 flex-1 truncate border-none bg-transparent py-2.5 text-sm text-gray-700 focus:outline-none"
      />

      <!-- Séparateur vertical -->
      <div class="my-2 w-px bg-gray-300"></div>

      <!-- Bouton Copier / Copié ! -->
      <button
        type="button"
        (click)="copy()"
        class="inline-flex shrink-0 items-center gap-1.5 rounded-r-lg px-4 py-2.5 text-sm font-medium transition-all"
        [class.bg-transparent]="!copied()"
        [class.text-indigo-600]="!copied()"
        [class.hover\:bg-indigo-50]="!copied()"
        [class.bg-green-50]="copied()"
        [class.text-green-700]="copied()"
      >
        @if (copied()) {
          <!-- Check icon -->
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          Copié !
        } @else {
          <!-- Clipboard icon -->
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
          </svg>
          Copier
        }
      </button>
    </div>

    <!-- Bouton régénérer -->
    <button
      type="button"
      (click)="generate()"
      class="mt-3 inline-flex items-center gap-1.5 text-sm font-medium text-gray-500 transition-colors hover:text-indigo-600"
      [disabled]="isGenerating()"
    >
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" />
      </svg>
      Régénérer
    </button>
  }
</div>
